name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the test suite (headless Chrome)
        run: pytest

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/report.html

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Add executor info for the report
        if: always()
        run: |
          cat > reports/allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Test Suite #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://nkuempoofu.github.io/pyqa-suite/"
          }
          EOF

      - name: Build Allure report
        if: always()
        run: allure generate reports/allure-results -o allure-report/report --clean --name "PyQA Suite - Test Report"

      - name: Build branded dashboard
        if: always()
        run: python scripts/build_dashboard.py allure-report/report allure-report

      - name: Publish dashboard and report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
