name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly regression run at 02:00 South Africa time (00:00 UTC)
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  test:
    name: test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the test suite (headless ${{ matrix.browser }})
        env:
          BROWSER: ${{ matrix.browser }}
        run: pytest -m "not health"

      - name: Tag results with browser
        if: always()
        run: python scripts/tag_browser.py reports/allure-results ${{ matrix.browser }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/report.html

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/allure-results

  report:
    name: publish report
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.event_name != 'pull_request'

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Chrome results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-chrome
          path: reports/allure-results

      - name: Download Edge results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-edge
          path: reports/allure-results

      - name: Write combined environment info
        run: |
          cat > reports/allure-results/environment.properties << EOF
          Python=3.12
          Browsers=Chrome + Microsoft Edge (matrix)
          OS=Ubuntu (GitHub Actions)
          Target.Site=https://www.saucedemo.com
          API.Under.Test=https://jsonplaceholder.typicode.com
          EOF

      - name: Add executor info for the report
        run: |
          cat > reports/allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Test Suite #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://nkuempoofu.github.io/pyqa-suite/"
          }
          EOF

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Load report history from previous runs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: Restore Allure history for trend charts
        run: |
          if [ -d gh-pages-history/report/history ]; then
            cp -r gh-pages-history/report/history reports/allure-results/history
            echo "History restored from previous run"
          else
            echo "No previous history found - starting fresh"
          fi

      - name: Build Allure report
        run: allure generate reports/allure-results -o allure-report/report --clean --name "PyQA Suite - Test Report"

      - name: Build branded dashboard
        run: python scripts/build_dashboard.py allure-report/report allure-report

      - name: Publish dashboard and report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
