[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --html=reports/report.html --self-contained-html --alluredir=reports/allure-results
markers =
    smoke: critical-path tests that must pass on every build
    regression: full-coverage tests run before each release
    ui: browser-based Selenium tests
    api: REST API tests (no browser needed)
